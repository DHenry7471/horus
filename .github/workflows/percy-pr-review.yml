name: Percy — PR Test Review

on:
  pull_request:
    paths:
      - 'example/tests/**'
      - 'example/**/*.test.ts'
      - 'example/**/*.spec.ts'

permissions:
  contents: read
  pull-requests: write

jobs:
  percy-review:
    name: Percy Test Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Need full history to diff

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build diff payload
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- 'example/tests/**' 'example/**/*.test.ts' 'example/**/*.spec.ts')
          # Escape for GitHub output (multiline)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Percy agent
        id: percy
        working-directory: example
        run: |
          OUTPUT=$(pnpm exec tsx agents/run-agent.ts percy "${{ steps.diff.outputs.diff }}")
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post Percy review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.percy.outputs.output }}`;
            const body = [
              '## 🔍 Percy — Test Change Review',
              '',
              output,
              '',
              `---`,
              `*Generated by [percy](https://github.com/DHenry7471/claude_agents) · run \`${context.runId}\`*`,
            ].join('\n');

            // Find and update an existing Percy comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 🔍 Percy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
