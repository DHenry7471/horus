name: Percy — PR Test Review

on:
  pull_request:
    paths:
      - 'example/tests/**'
      - 'example/**/*.test.ts'
      - 'example/**/*.spec.ts'

permissions:
  contents: read
  pull-requests: write

jobs:
  percy-review:
    name: Percy Test Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Need full history to diff

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Percy input (PercyInput contract)
        id: input
        run: |
          # Fetch unified diff — GitHub API format preferred for accurate line numbers
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- \
            'example/tests/**' 'example/**/*.test.ts' 'example/**/*.spec.ts')
          INPUT=$(jq -n \
            --arg diff "$DIFF" \
            --arg prUrl "https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}" \
            --arg prTitle "${{ github.event.pull_request.title }}" \
            '{diff: $diff, prUrl: $prUrl, prTitle: $prTitle}')
          echo "$INPUT" > /tmp/percy-input.json
          echo "input_file=/tmp/percy-input.json" >> "$GITHUB_OUTPUT"

      - name: Run horus-percy agent
        id: percy
        working-directory: example
        run: |
          # Output is structured JSON (PercyOutput) — no text parsing required
          OUTPUT=$(pnpm exec tsx agents/run-horus-agent.ts horus-percy --input-file ${{ steps.input.outputs.input_file }})
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HORUS_REPORTS_DIR: ./reports

      - name: Post Percy review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const raw = `${{ steps.percy.outputs.output }}`;
            const result = JSON.parse(raw);

            const verdictEmoji = {
              APPROVE: '✅',
              REQUEST_CHANGES: '🚫',
              COMMENT: '💬',
            }[result.overallVerdict] ?? '❓';

            // Format must-fix items as a table
            const mustFixRows = result.mustFix.map(c =>
              `| \`${c.file}\`:${c.line} | \`${c.standard}\` | ${c.comment} |`
            );
            const mustFixSection = result.mustFix.length > 0
              ? ['**Must Fix**', '', '| Location | Standard | Comment |', '|----------|----------|---------|', ...mustFixRows].join('\n')
              : '';

            // Format recommended items
            const recRows = result.recommended.map(c =>
              `| \`${c.file}\`:${c.line} | \`${c.standard}\` | ${c.comment} |`
            );
            const recSection = result.recommended.length > 0
              ? ['**Recommended**', '', '| Location | Standard | Comment |', '|----------|----------|---------|', ...recRows].join('\n')
              : '';

            const body = [
              `## 🔍 Percy — Test Change Review`,
              '',
              `${verdictEmoji} **${result.overallVerdict}** — ${result.summary}`,
              '',
              mustFixSection,
              recSection ? '' : null,
              recSection,
              '',
              '---',
              `*horus-percy · run [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].filter(l => l !== null).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 🔍 Percy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // REQUEST_CHANGES → request review changes via the Reviews API
            if (result.overallVerdict === 'REQUEST_CHANGES') {
              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  event: 'REQUEST_CHANGES',
                  body: result.summary,
                });
              } catch (e) {
                console.warn('Could not submit review (may lack permission):', e.message);
              }
            }
