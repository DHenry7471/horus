name: Felix — Test Failure Triage

on:
  workflow_run:
    workflows: ['Horus CI — Quality Gate']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  felix-triage:
    name: Felix Failure Triage
    runs-on: ubuntu-latest
    # Only run when the CI workflow failed
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: example/reports/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: example/reports/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: example/reports/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build Felix input (FelixInput contract)
        id: input
        working-directory: example
        run: |
          UNIT=$(cat reports/unit-results.json 2>/dev/null || echo 'null')
          INTG=$(cat reports/integration-results.json 2>/dev/null || echo 'null')
          E2E=$(cat reports/e2e-results.json 2>/dev/null || echo 'null')
          # git diff --name-only gives felix the file-level correlation signal
          DIFF=$(git diff origin/${{ github.event.workflow_run.head_branch }}...HEAD --name-only 2>/dev/null || echo '')
          INPUT=$(jq -n \
            --argjson ciReport "{\"unit\":$UNIT,\"integration\":$INTG,\"e2e\":$E2E}" \
            --arg gitDiff "$DIFF" \
            --arg branch "${{ github.event.workflow_run.head_branch }}" \
            --arg runId "${{ github.event.workflow_run.id }}" \
            '{ciReport: $ciReport, gitDiff: $gitDiff, branch: $branch, runId: $runId}')
          echo "$INPUT" > /tmp/felix-input.json
          echo "input_file=/tmp/felix-input.json" >> "$GITHUB_OUTPUT"

      - name: Run horus-felix agent
        id: felix
        working-directory: example
        run: |
          # Output is structured JSON (FelixOutput) — no text parsing required
          OUTPUT=$(pnpm exec tsx agents/run-horus-agent.ts horus-felix --input-file ${{ steps.input.outputs.input_file }})
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HORUS_REPORTS_DIR: ./reports

      - name: Extract verdict from structured output
        id: verdict
        run: |
          # mergeRecommendation is a first-class field — no grep required
          RECOMMENDATION=$(echo '${{ steps.felix.outputs.output }}' | jq -r '.mergeRecommendation')
          echo "block=$([ "$RECOMMENDATION" = "BLOCK" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "recommendation=$RECOMMENDATION" >> "$GITHUB_OUTPUT"

      - name: Post Felix triage as PR comment
        uses: actions/github-script@v7
        env:
          FELIX_OUTPUT: ${{ steps.felix.outputs.output }}
        with:
          script: |
            const raw = process.env.FELIX_OUTPUT;
            const result = JSON.parse(raw);
            const isBlock = result.mergeRecommendation === 'BLOCK';
            const verdict = isBlock ? '🚫 **BLOCK**' : '✅ **ALLOW**';

            // Build a structured comment from typed FelixOutput fields
            const failureLines = result.failures.map(f =>
              `| \`${f.testName}\` | ${f.classification} | ${f.confidence} | ${f.suggestedAction} |`
            );

            const failureTable = result.failures.length > 0
              ? [
                  '| Test | Class | Confidence | Action |',
                  '|------|-------|------------|--------|',
                  ...failureLines,
                ].join('\n')
              : '_No failures recorded._';

            const body = [
              `## 🔬 Felix — Test Failure Triage`,
              '',
              `**Verdict:** ${verdict}`,
              `**Reason:** ${result.mergeReason}`,
              `**Total failures:** ${result.totalFailures}`,
              '',
              failureTable,
              '',
              '---',
              `*horus-felix · run [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n');

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ github.event.workflow_run.head_branch }}`,
            });

            if (prs.length === 0) {
              console.log('No open PR found for this branch — skipping comment.');
              return;
            }

            const pr = prs[0];
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 🔬 Felix')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

            if (isBlock) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['merge-block'],
                });
              } catch (e) {
                console.warn('Could not add merge-block label:', e.message);
              }
            }
