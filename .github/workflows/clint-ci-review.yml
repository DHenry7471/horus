name: Clint — CI Pipeline Review

on:
  pull_request:
    paths:
      - '.github/workflows/*.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  clint-review:
    name: Clint CI Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Need full history to diff

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build diff payload
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '.github/workflows/*.yml')
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Clint agent
        id: clint
        continue-on-error: true
        working-directory: example
        run: |
          OUTPUT=$(pnpm exec tsx agents/run-agent.ts clint "$CLINT_DIFF")
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLINT_DIFF: ${{ steps.diff.outputs.diff }}

      - name: Post Clint review as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          CLINT_OUTPUT: ${{ steps.clint.outputs.output }}
        with:
          script: |
            const output = process.env.CLINT_OUTPUT ?? '';
            const body = [
              '## 🔒 Clint — CI Pipeline Review',
              '',
              output,
              '',
              '---',
              `*Generated by [clint](https://github.com/DHenry7471/claude_agents) · run \`${context.runId}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 🔒 Clint')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
